<!DOCTYPE html>

<head>
<meta charset="UTF-8" />

<title>Rush OS — Prototype</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600;700&family=IBM+Plex+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" />
<style>
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body { font-family: 'IBM Plex Sans', system-ui, sans-serif; -webkit-font-smoothing: antialiased; background: #ECEEF1; }
  button { font-family: inherit; }
  ::selection { background: rgba(30,58,99,0.16); }
  /* scrollbars */
  .rush-tablet-screen::-webkit-scrollbar { width: 0; }
  *::-webkit-scrollbar { width: 9px; height: 9px; }
  *::-webkit-scrollbar-thumb { background: #cfd4da; border-radius: 999px; }
  *::-webkit-scrollbar-track { background: transparent; }
  .rush-btn:hover { filter: brightness(0.95); }
  .rush-btn:active { transform: translateY(1px); }
  .rush-row:hover { background: #FAFBFC; }
  select { font-family: 'IBM Plex Sans', sans-serif; }
</style>
</head>

<div id="root"></div>
